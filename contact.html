<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contact | UK Calc Hub</title>

<meta name="description" content="Contact UK Calc Hub for support or feedback about our free UK calculators.">
<style>/* =========================
   CONTACT PAGE (SIMPLE HTML)
   UK Calc Hub
   ========================= */

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f9fafb;
  color: #111;
  line-height: 1.6;
}

/* HEADER */
header {
  background: #2563eb;
  color: white;
  padding: 30px 20px;
  text-align: center;
}

header h1 {
  margin: 0;
  font-size: 32px;
}

/* MAIN SECTION */
section {
  max-width: 800px;
  margin: 50px auto;
  padding: 20px;
  background: white;
  border-radius: 12px;
  border: 1px solid #e5e7eb;
  box-shadow: 0 6px 18px rgba(0,0,0,0.05);
}

/* TEXT */
p {
  font-size: 16px;
  color: #444;
  margin-bottom: 15px;
}

/* SUB HEADINGS */
h2 {
  margin-top: 25px;
  font-size: 20px;
  color: #111;
  border-left: 4px solid #2563eb;
  padding-left: 10px;
}

/* EMAIL EMPHASIS */
section p:nth-of-type(2) {
  font-weight: bold;
  color: #2563eb;
  font-size: 18px;
}

/* HOVER EFFECT (optional nice touch) */
section:hover {
  transform: translateY(-2px);
  transition: 0.3s ease;
}

/* RESPONSIVE */
@media (max-width: 600px) {
  header h1 {
    font-size: 24px;
  }

  section {
    margin: 20px 10px;
    padding: 15px;
  }
}</style>
</head>

<body>

<header>
<h1>Contact Us</h1>
</header>

<section>

<p>If you have any questions or feedback, feel free to contact us.</p>

<h2>Email</h2>
<p>support@ukcalchub.com</p>

<h2>Feedback</h2>
<p>
We welcome suggestions to improve our calculators.
</p>

</section>




</body>
</html>
